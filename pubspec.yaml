name: businesssajilo
description: "BusinessSajilo - inventory, ordering, billing and udharo tracking for Nepali dealers and retailers."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cached_network_image: ^3.4.1
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  json_annotation: ^4.12.0
  nepali_utils: ^3.0.8
  supabase_flutter: ^2.14.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  drift_dev: ^2.34.0

flutter:
  uses-material-design: true
  generate: true
