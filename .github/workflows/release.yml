name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Secrets aren't reliably comparable in `if:` expressions — export via env.
      - name: Check deploy secrets
        id: secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "has_supabase=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_supabase=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "has_vercel=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vercel=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.secrets.outputs.has_supabase == 'true'
      - name: Link Supabase project
        if: steps.secrets.outputs.has_supabase == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Push database migrations
        if: steps.secrets.outputs.has_supabase == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
      - name: Deploy Edge Functions
        if: steps.secrets.outputs.has_supabase == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Build web (CanvasKit)
        run: |
          flutter build web --release --web-renderer canvaskit \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=FLAVOR=prod
      - name: Build Android App Bundle
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=FLAVOR=prod
      - uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            build/web
            build/app/outputs/bundle/release/app-release.aab
      - name: Deploy to Vercel
        if: steps.secrets.outputs.has_vercel == 'true'
        run: npx vercel deploy build/web --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
